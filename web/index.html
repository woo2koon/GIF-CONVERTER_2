<!DOCTYPE html>

<html lang="ko" style="background-color: #f5f7f9;">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>GIF Converter</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script type="text/javascript" src="/eel.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                        manrope: ['Pretendard', 'Inter', 'sans-serif'],
                    },
                    "colors": {
                        "surface-container-low": "#eef1f3",
                        "secondary-container": "#d6cbff",
                        "secondary": "#604ab3",
                        "error-dim": "#a70138",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f5f7f9",
                        "on-error": "#ffefef",
                        "error-container": "#f74b6d",
                        "error": "#b41340",
                        "on-tertiary": "#ffeef4",
                        "primary-container": "#9596ff",
                        "on-primary-fixed": "#000000",
                        "surface-dim": "#d0d5d8",
                        "inverse-on-surface": "#9a9d9f",
                        "surface-tint": "#4340e6",
                        "primary": "#4340e6",
                        "surface-container": "#e5e8eb",
                        "on-background": "#2c2f31",
                        "tertiary-fixed": "#fc8bce",
                        "surface": "#f5f7f9",
                        "on-primary-container": "#0d0080",
                        "secondary-dim": "#543da6",
                        "tertiary-dim": "#882a68",
                        "on-surface-variant": "#595c5e",
                        "inverse-surface": "#0b0f10",
                        "secondary-fixed-dim": "#c9bbff",
                        "secondary-fixed": "#d6cbff",
                        "primary-fixed": "#9596ff",
                        "inverse-primary": "#8283ff",
                        "primary-dim": "#362fdb",
                        "on-secondary": "#f6f0ff",
                        "on-secondary-fixed-variant": "#553ea7",
                        "outline": "#747779",
                        "surface-container-highest": "#d9dde0",
                        "on-primary": "#f4f1ff",
                        "on-tertiary-fixed": "#350026",
                        "tertiary-fixed-dim": "#ec7ec0",
                        "surface-container-high": "#dfe3e6",
                        "tertiary": "#973775",
                        "on-tertiary-fixed-variant": "#6c1050",
                        "on-secondary-container": "#4b349d",
                        "background": "#f5f7f9",
                        "outline-variant": "#abadaf",
                        "tertiary-container": "#fc8bce",
                        "on-error-container": "#510017",
                        "on-tertiary-container": "#600247",
                        "on-primary-fixed-variant": "#13009c",
                        "on-secondary-fixed": "#381c89",
                        "on-surface": "#2c2f31",
                        "surface-variant": "#d9dde0",
                        "primary-fixed-dim": "#8586ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-manrope {
            font-family: 'Manrope', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d9dde0;
            border-radius: 10px;
        }

        /* Custom Dropdown Styles */
        .dropdown-menu {
            transform-origin: top;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(-10px) scaleY(0.95);
            pointer-events: none;
            display: block !important;
            visibility: hidden;
        }

        .dropdown-menu.show {
            opacity: 1;
            transform: translateY(0) scaleY(1);
            pointer-events: auto;
            visibility: visible;
        }

        .dropdown-item.active {
            background-color: #f0f3ff;
            color: #4f46e5;
            font-weight: 700;
        }
    </style>
</head>

<body class="bg-surface text-on-surface h-screen flex flex-col overflow-hidden">

    <div class="flex-1 flex overflow-hidden">
        <!-- SideNavBar / Left Column: File Library -->
        <aside
            class="w-80 bg-slate-100 flex flex-col gap-4 p-4 border-r border-slate-200/10 font-manrope font-medium text-sm">
            <div class="flex items-center justify-between mb-2 px-1">
                <div class="flex items-center gap-4 ml-1">
                    <h2 class="text-on-surface-variant font-extrabold uppercase tracking-widest text-base">파일</h2>
                    <div class="flex items-center gap-2 ml-1">
                        <input
                            class="w-3.5 h-3.5 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 cursor-pointer"
                            id="select-all-lib" type="checkbox" />
                        <label class="text-xs font-bold text-on-surface-variant uppercase cursor-pointer tracking-tight"
                            for="select-all-lib">전체 선택</label>
                    </div>
                </div>
                <input type="file" id="video-upload" accept="video/mp4,video/*" class="hidden" multiple />
                <button id="add-video-btn" class="p-1.5 hover:bg-slate-200 rounded-lg transition-all active:scale-95" title="파일 추가">
                    <span class="material-symbols-outlined text-xl font-bold" data-icon="add">add</span>
                </button>
            </div>
            <div id="library-list" class="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-3">
                <!-- Files will be dynamically injected here -->
            </div>

        </aside>
        <!-- Center Column: Preview Player -->
        <main class="flex-1 bg-surface flex flex-col p-8 overflow-hidden">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 id="header-filename"
                        class="font-manrope text-2xl font-extrabold tracking-tight text-on-surface truncate max-w-[400px]">
                        파일을 선택해주세요</h1>
                    <p id="header-resolution" class="text-on-surface-variant text-sm">-</p>
                </div>
            </div>

            <!-- Modern Video Player Area -->
            <div class="flex-1 flex flex-col items-center justify-center">
                <div
                    class="w-full aspect-video bg-black rounded-xl shadow-2xl overflow-hidden relative group flex items-center justify-center">
                    <video id="main-player" class="w-full h-full object-contain hidden" playsinline
                        webkit-playsinline disablePictureInPicture></video>
                    <div id="placeholder-msg" class="text-on-surface-variant font-medium text-white">비디오를 선택하거나 업로드하세요
                    </div>
                </div>

                <!-- Professional Player Controls -->
                <div id="player-controls" class="w-full mt-4 flex items-center justify-between px-4 py-3 bg-surface-container-high rounded-xl border border-white/20 shadow-sm" style="will-change: transform; backface-visibility: hidden;">
                    <div class="flex items-center gap-4">
                        <div class="flex items-center bg-slate-200/50 rounded-lg p-1">
                            <button id="step-back-btn" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded transition-all text-on-surface-variant">
                                <span class="material-symbols-outlined text-[20px]">chevron_left</span>
                            </button>
                            <button id="play-pause-btn" class="w-10 h-10 flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-all shadow-md">
                                <span id="play-icon" class="material-symbols-outlined text-[24px]">play_arrow</span>
                            </button>
                            <button id="step-forward-btn" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded transition-all text-on-surface-variant">
                                <span class="material-symbols-outlined text-[20px]">chevron_right</span>
                            </button>
                        </div>
                        <div class="flex items-center gap-2 font-mono text-sm font-bold text-on-surface-variant" style="font-variant-numeric: tabular-nums; -webkit-font-smoothing: antialiased; transform: translateZ(0);">
                            <span id="current-time-display" class="text-indigo-600">00:00.0</span>
                            <span class="opacity-30">/</span>
                            <span id="total-time-display">00:00.0</span>
                        </div>
                    </div>

                    <div class="flex items-center">
                         <!-- Volume Controls -->
                         <div class="flex items-center gap-2.5 text-on-surface-variant bg-slate-200/50 px-3 py-1.5 rounded-lg border border-white/20">
                            <button id="mute-btn" class="flex items-center justify-center hover:text-indigo-600 transition-colors">
                                <span id="volume-icon" class="material-symbols-outlined text-[20px] leading-none">volume_up</span>
                            </button>
                            <input id="volume-slider" type="range" min="0" max="1" step="0.05" value="0.8"
                                class="w-20 h-1 rounded-full appearance-none cursor-pointer accent-indigo-600" />
                         </div>
                    </div>
                </div>

                <!-- Timeline Scrubber Section -->
                <div id="timeline-area" class="w-full mt-8 bg-surface-container-low p-6 rounded-xl">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-4">
                            <span class="text-sm font-bold text-on-surface-variant font-manrope">타임라인 구간 자르기</span>
                            <button id="trim-reset-btn"
                                class="text-xs bg-slate-200 hover:bg-slate-300 px-2 py-1 rounded font-bold transition-colors">초기화</button>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="flex gap-3 text-xs font-bold text-indigo-600">
                                <span class="bg-indigo-600/10 px-2 py-1 rounded" id="trim-start-display">시작: 00:00.0</span>
                                <span class="bg-indigo-600/10 px-2 py-1 rounded" id="trim-end-display">종료: 00:00.0</span>
                            </div>
                        </div>
                    </div>

                    <!-- Premium Timeline Scrubber -->
                    <div id="timeline-container" class="w-full mt-2">
                        <div class="relative h-5 bg-slate-200 rounded-md select-none cursor-pointer overflow-hidden" id="timeline-track">
                            
                            <!-- Left Mask: area BEFORE IN point (dimmed) -->
                            <div id="mask-left" class="absolute left-0 h-full bg-black/25 z-10 pointer-events-none"></div>
                            
                            <!-- Right Mask: area AFTER OUT point (dimmed) -->
                            <div id="mask-right" class="absolute right-0 h-full bg-black/25 z-10 pointer-events-none"></div>
                            
                            <!-- Selected Range (no fill needed, masks handle it) -->
                            <div id="trim-range" class="absolute h-full z-10 pointer-events-none"></div>
                            
                            <!-- Handles -->
                            <div id="handle-left" class="absolute h-full w-2.5 bg-indigo-600 cursor-ew-resize z-20 flex items-center justify-center -translate-x-1/2">
                                <div class="w-0.5 h-3 bg-white/80 rounded-full"></div>
                            </div>
                            <div id="handle-right" class="absolute h-full w-2.5 bg-indigo-600 cursor-ew-resize z-20 flex items-center justify-center -translate-x-1/2">
                                <div class="w-0.5 h-3 bg-white/80 rounded-full"></div>
                            </div>
                            
                            <!-- Playhead -->
                            <div id="playhead" class="absolute h-full w-0.5 bg-rose-500 z-30 pointer-events-none" style="left: 0; will-change: transform;">
                                <div class="absolute -top-0.5 -left-[4px] w-2.5 h-2.5 bg-rose-500 rounded-sm rotate-45"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <!-- Right Column: Output Settings -->

        <aside class="w-80 bg-surface-container-low flex flex-col h-full border-l border-white/5">
            <!-- Scrollable Settings Area -->
            <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-6 custom-scrollbar">
                <h2 class="font-manrope text-lg font-bold text-on-surface mb-2">출력 설정</h2>

                <!-- Resolution -->
                <div class="space-y-3">
                    <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest font-manrope">해상도</label>
                    <div class="relative custom-dropdown" id="res-dropdown">
                        <button class="dropdown-trigger w-full bg-surface-container-lowest border-none rounded-xl py-3 px-4 text-base font-medium flex items-center justify-between shadow-sm hover:bg-slate-50 transition-colors">
                            <span id="res-selected">중간 (720p)</span>
                            <span class="material-symbols-outlined text-slate-400">expand_more</span>
                        </button>
                        <ul class="dropdown-menu absolute z-50 w-full mt-1 bg-white rounded-xl shadow-2xl border border-slate-100 overflow-hidden">
                            <li class="dropdown-item px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors" data-value="원본">원본</li>
                            <li class="dropdown-item px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors active" data-value="중간 (720p)">중간 (720p)</li>
                            <li class="dropdown-item px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors" data-value="작게 (480p)">작게 (480p)</li>
                            <li class="dropdown-item px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors" data-value="직접 설정">직접 설정</li>
                        </ul>
                    </div>
                    <!-- Custom Resolution Inputs -->
                    <div id="custom-res-container" class="hidden grid grid-cols-2 gap-3 p-4 bg-slate-100/50 rounded-xl border border-slate-200 mt-2">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[10px] font-bold text-slate-500 uppercase px-1">가로 (Width)</label>
                            <input type="number" id="custom-width" class="bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary/20 outline-none" placeholder="가로">
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[10px] font-bold text-slate-500 uppercase px-1">세로 (Height)</label>
                            <input type="number" id="custom-height" class="bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary/20 outline-none" placeholder="세로">
                        </div>
                        <div class="col-span-2 flex items-center gap-2 mt-1 px-1">
                            <input type="checkbox" id="aspect-ratio-lock" checked class="w-4 h-4 accent-primary rounded cursor-pointer">
                            <label for="aspect-ratio-lock" class="text-xs font-bold text-slate-600 cursor-pointer">비율 유지</label>
                        </div>
                    </div>
                </div>

                <!-- Color Depth -->
                <div class="space-y-3">
                    <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest font-manrope">색상 수</label>
                    <div class="relative custom-dropdown" id="colors-dropdown">
                        <button class="dropdown-trigger w-full bg-surface-container-lowest border-none rounded-xl py-3 px-4 text-base font-medium flex items-center justify-between shadow-sm hover:bg-slate-50 transition-colors">
                            <span id="colors-selected">256색 (고화질)</span>
                            <span class="material-symbols-outlined text-slate-400">palette</span>
                        </button>
                        <ul class="dropdown-menu absolute z-50 w-full mt-1 bg-white rounded-xl shadow-2xl border border-slate-100 overflow-hidden">
                            <li class="dropdown-item px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors active" data-value="256">256색 (고화질)</li>
                            <li class="dropdown-item px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors" data-value="128">128색 (일반)</li>
                            <li class="dropdown-item px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors" data-value="64">64색 (저용량)</li>
                            <li class="dropdown-item px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors" data-value="32">32색 (초저용량)</li>
                        </ul>
                    </div>
                </div>

                <!-- Frame Rate -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest font-manrope">프레임 레이트</label>
                        <span id="fps-display" class="text-sm font-bold text-primary font-manrope">24 FPS</span>
                    </div>
                    <div class="flex flex-col">
                        <input id="fps-slider"
                            class="w-full h-2 bg-surface-container-highest rounded-full appearance-none cursor-pointer accent-primary"
                            max="30" min="5" type="range" value="24" />
                        <div class="relative h-4 text-[10px] text-slate-500 font-bold mx-[10px] mt-1.5">
                            <span class="absolute left-0 -translate-x-1/2">5</span>
                            <span class="absolute left-[20%] -translate-x-1/2">10</span>
                            <span class="absolute left-[40%] -translate-x-1/2">15</span>
                            <span class="absolute left-[60%] -translate-x-1/2">20</span>
                            <span class="absolute left-[80%] -translate-x-1/2">25</span>
                            <span class="absolute left-full -translate-x-1/2">30</span>
                        </div>
                    </div>
                </div>

                <!-- Optimization Toggles -->
                <div class="bg-surface-container-lowest p-4 rounded-xl space-y-4 shadow-sm border border-slate-100">
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-on-surface">반복 재생</span>
                            <span class="text-[10px] text-on-surface-variant">애니메이션 연속 재생</span>
                        </div>
                        <div id="loop-toggle" data-active="true"
                            class="w-10 h-5 bg-primary rounded-full relative p-0.5 cursor-pointer transition-colors"
                            onclick="this.classList.toggle('bg-primary'); this.classList.toggle('bg-slate-300'); const circle = this.children[0]; circle.classList.toggle('translate-x-5'); this.dataset.active = this.classList.contains('bg-primary') ? 'true' : 'false'">
                            <div class="w-4 h-4 bg-white rounded-full transition-transform pointer-events-none translate-x-5 shadow-sm"></div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-on-surface">디더링</span>
                            <span class="text-[10px] text-on-surface-variant">부드러운 그라데이션</span>
                        </div>
                        <div id="dither-toggle" data-active="false"
                            class="w-10 h-5 bg-slate-300 rounded-full relative p-0.5 cursor-pointer transition-colors"
                            onclick="this.classList.toggle('bg-primary'); this.classList.toggle('bg-slate-300'); const circle = this.children[0]; circle.classList.toggle('translate-x-5'); this.dataset.active = this.classList.contains('bg-primary') ? 'true' : 'false'">
                            <div class="w-4 h-4 bg-white rounded-full transition-transform pointer-events-none shadow-sm"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Fixed Footer Button Area -->
            <div class="p-6 bg-surface-container-low z-10">
                <button id="convert-btn"
                    class="w-full bg-gradient-to-r from-primary to-primary-container text-white py-5 rounded-xl font-manrope font-extrabold text-xl uppercase tracking-widest shadow-lg shadow-primary/30 hover:shadow-primary/50 transition-all flex items-center justify-center gap-2 group">
                    GIF로 변환
                </button>
            </div>
        </aside>
    </div>

    <!-- Floating Status Bar -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
        <div id="status-bar" class="bg-white/80 backdrop-blur-md border border-white/20 shadow-xl px-6 py-2 rounded-full transition-all duration-300 opacity-0 scale-95 flex items-center gap-3">
            <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
            <p id="status-msg" class="text-xs font-manrope font-bold text-on-surface tracking-wide">대기 중...</p>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>

</html>
